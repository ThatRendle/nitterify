<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nitterify options</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 2rem;
        max-width: 32rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.25rem;
      }
      p.sub {
        margin: 0 0 1.5rem;
        opacity: 0.7;
        font-size: 0.9rem;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.4rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
      }
      input {
        flex: 1;
        padding: 0.5rem 0.6rem;
        font-size: 1rem;
        border: 1px solid currentColor;
        border-radius: 6px;
        background: transparent;
        color: inherit;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
      }
      .hint {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        opacity: 0.7;
      }
      .status {
        margin-top: 1rem;
        min-height: 1.2em;
        font-size: 0.9rem;
        color: #1a7f37;
      }
    </style>
  </head>
  <body>
    <h1>nitterify</h1>
    <p class="sub">Redirect x.com status and article links to a Nitter instance.</p>

    <form id="form">
      <label for="instance">Nitter instance</label>
      <div class="row">
        <input
          id="instance"
          name="instance"
          type="text"
          placeholder="xcancel.com"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="submit">Save</button>
      </div>
      <p class="hint">Just the host, e.g. <code>xcancel.com</code> or your own instance.</p>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </form>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
